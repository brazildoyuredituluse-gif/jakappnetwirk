<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVA STORE</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0a0a0f;--surface:#12121a;--card:#1a1a26;--border:rgba(255,255,255,0.07);
  --gold:#c9a96e;--gold-light:#e8c98a;--white:#f5f0e8;--muted:#7a7a8a;
  --accent:#e85d75;--green:#4caf8a;--blue:#5b8dee;--radius:16px;
  --font:'DM Sans',sans-serif;--serif:'Playfair Display',serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--white);overflow-x:hidden;min-height:100vh}
button{font-family:var(--font);cursor:pointer}
input,select,textarea{font-family:var(--font)}

/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes float{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-16px) rotate(1deg)}}
@keyframes pulse{0%,100%{transform:scale(1);opacity:0.8}50%{transform:scale(1.1);opacity:0.4}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

/* PAGE SYSTEM */
.page{display:none;min-height:100vh}
.page.active{display:block;animation:fadeIn 0.4s ease both}
.auth-page{display:none;min-height:100vh;align-items:center;justify-content:center;position:relative;overflow:hidden;
  background:radial-gradient(ellipse at 70% 30%,rgba(201,169,110,0.12) 0%,transparent 60%),
  radial-gradient(ellipse at 20% 80%,rgba(232,93,117,0.08) 0%,transparent 50%),var(--bg)}
.auth-page.active{display:flex;animation:fadeIn 0.4s ease both}

/* LOADING SCREEN */
#loading-screen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px}
.loading-logo{font-family:var(--serif);font-size:2.5rem;font-weight:900;letter-spacing:0.2em;color:var(--gold)}
.loading-logo span{color:var(--white)}
.loading-bar{width:200px;height:3px;background:var(--border);border-radius:3px;overflow:hidden}
.loading-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:3px;animation:loadBar 1.5s ease both}
@keyframes loadBar{from{width:0}to{width:100%}}
.loading-text{font-size:0.8rem;color:var(--muted);letter-spacing:0.1em}

/* AUTH SHAPES */
.auth-bg-shapes{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.auth-shape{position:absolute;border-radius:50%;border:1px solid}
.s1{width:500px;height:500px;top:-150px;right:-150px;border-color:rgba(201,169,110,0.1);animation:pulse 8s ease-in-out infinite}
.s2{width:300px;height:300px;bottom:-100px;left:-100px;border-color:rgba(232,93,117,0.08);animation:pulse 10s ease-in-out infinite reverse}

/* AUTH CONTAINER */
.auth-container{display:grid;grid-template-columns:1fr 1fr;max-width:960px;width:100%;margin:20px;
  background:var(--surface);border:1px solid var(--border);border-radius:28px;overflow:hidden;
  box-shadow:0 40px 120px rgba(0,0,0,0.6);position:relative;z-index:2}
.auth-visual{background:linear-gradient(135deg,#1a1228 0%,#0f1a24 100%);padding:60px 50px;
  display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
.auth-visual::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(201,169,110,0.15) 0%,transparent 70%)}
.auth-logo{font-family:var(--serif);font-size:1.8rem;font-weight:900;letter-spacing:0.2em;color:var(--gold);position:relative}
.auth-logo span{color:var(--white)}
.auth-tagline{font-size:0.78rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-top:4px}
.auth-visual-center{text-align:center;position:relative}
.auth-big-emoji{font-size:7rem;display:block;animation:float 5s ease-in-out infinite;line-height:1.2;margin-bottom:20px}
.auth-visual h2{font-family:var(--serif);font-size:1.8rem;font-weight:900;line-height:1.2;margin-bottom:12px}
.auth-visual h2 em{font-style:italic;color:var(--gold)}
.auth-visual p{color:var(--muted);font-size:0.85rem;line-height:1.7}
.auth-features{display:flex;flex-direction:column;gap:12px;position:relative}
.auth-feature{display:flex;align-items:center;gap:12px;font-size:0.82rem;color:var(--muted)}
.auth-feature-icon{width:32px;height:32px;background:rgba(201,169,110,0.1);border:1px solid rgba(201,169,110,0.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}

/* AUTH FORM */
.auth-form-side{padding:52px 48px;display:flex;flex-direction:column;justify-content:center}
.auth-tabs{display:flex;gap:4px;background:var(--bg);border-radius:12px;padding:4px;margin-bottom:32px}
.auth-tab{flex:1;padding:10px;border-radius:8px;border:none;background:transparent;color:var(--muted);font-size:0.88rem;font-weight:600;transition:all 0.3s}
.auth-tab.active{background:var(--card);color:var(--white);box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.auth-form-title{font-family:var(--serif);font-size:1.7rem;font-weight:900;margin-bottom:6px}
.auth-form-sub{color:var(--muted);font-size:0.85rem;margin-bottom:28px;line-height:1.5}

.form-group{margin-bottom:18px;position:relative}
.form-label{font-size:0.75rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:block}
.form-input{width:100%;padding:13px 16px;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;color:var(--white);font-size:0.9rem;transition:all 0.3s;outline:none}
.form-input::placeholder{color:rgba(122,122,138,0.5)}
.form-input:focus{border-color:var(--gold);box-shadow:0 0 0 4px rgba(201,169,110,0.08)}
.form-input.error{border-color:var(--accent);animation:shake 0.3s ease}
.input-icon{position:relative}
.input-icon .form-input{padding-left:44px}
.input-icon .icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:1rem;pointer-events:none}
.pw-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);font-size:1rem;transition:color 0.2s}
.pw-toggle:hover{color:var(--gold)}
.form-error{color:var(--accent);font-size:0.75rem;margin-top:6px;display:none;align-items:center;gap:4px}
.form-error.show{display:flex}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.divider{display:flex;align-items:center;gap:14px;margin:18px 0;color:var(--muted);font-size:0.78rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.social-btns{display:flex;gap:10px;margin-bottom:16px}
.social-btn{flex:1;padding:11px;border:1.5px solid var(--border);border-radius:12px;background:transparent;color:var(--white);font-size:0.82rem;font-weight:500;transition:all 0.3s;display:flex;align-items:center;justify-content:center;gap:8px}
.social-btn:hover{border-color:var(--gold);color:var(--gold)}
.btn-auth{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--gold),var(--gold-light));color:#0a0a0f;font-size:0.95rem;font-weight:700;letter-spacing:0.02em;transition:all 0.3s;position:relative;overflow:hidden}
.btn-auth:hover{transform:translateY(-2px);box-shadow:0 15px 40px rgba(201,169,110,0.4)}
.btn-auth:disabled{opacity:0.6;transform:none;cursor:not-allowed}
.spinner{display:inline-block;width:15px;height:15px;border:2px solid rgba(10,10,15,0.3);border-top-color:#0a0a0f;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}
.auth-footer{text-align:center;margin-top:18px;font-size:0.82rem;color:var(--muted)}
.auth-footer a{color:var(--gold);font-weight:600;cursor:pointer}
.remember-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.checkbox-label{display:flex;align-items:center;gap:8px;font-size:0.82rem;color:var(--muted);cursor:pointer}
.checkbox-label input{accent-color:var(--gold)}
.forgot-link{font-size:0.82rem;color:var(--gold);font-weight:600;cursor:pointer}
.terms-text{font-size:0.73rem;color:var(--muted);text-align:center;margin-top:12px;line-height:1.6}
.terms-text a{color:var(--gold);cursor:pointer}

/* PASS STRENGTH */
.strength-wrap{margin-top:8px;display:none}
.strength-bar-bg{height:4px;background:var(--border);border-radius:4px;margin-bottom:4px}
.strength-bar{height:100%;border-radius:4px;transition:all 0.3s;width:0%}
.strength-text{font-size:0.72rem;color:var(--muted)}

/* ALERT */
.alert{padding:12px 16px;border-radius:10px;font-size:0.83rem;margin-bottom:16px;display:none;align-items:center;gap:10px;animation:slideUp 0.3s ease}
.alert.show{display:flex}
.alert-error{background:rgba(232,93,117,0.1);border:1px solid rgba(232,93,117,0.3);color:var(--accent)}
.alert-success{background:rgba(76,175,138,0.1);border:1px solid rgba(76,175,138,0.3);color:var(--green)}

/* ═══ MAIN APP ═══ */
#app-page{display:none}
#app-page.active{display:block}

.header{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 60px;height:68px;background:rgba(10,10,15,0.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);animation:slideDown 0.6s ease both}
.logo{font-family:var(--serif);font-size:1.4rem;font-weight:900;letter-spacing:0.2em;color:var(--gold);cursor:pointer}
.logo span{color:var(--white)}
.header-search{flex:1;max-width:480px;margin:0 32px;position:relative}
.search-input{width:100%;padding:9px 18px 9px 42px;background:var(--card);border:1.5px solid var(--border);border-radius:100px;color:var(--white);font-size:0.86rem;outline:none;transition:all 0.3s}
.search-input::placeholder{color:var(--muted)}
.search-input:focus{border-color:var(--gold)}
.search-icon{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:0.95rem;pointer-events:none}
.header-actions{display:flex;align-items:center;gap:14px}
.cart-btn{position:relative;background:linear-gradient(135deg,var(--gold),var(--gold-light));color:#0a0a0f;border:none;padding:8px 18px;border-radius:100px;font-size:0.8rem;font-weight:700;display:flex;align-items:center;gap:6px;transition:all 0.3s}
.cart-btn:hover{transform:scale(1.05);box-shadow:0 8px 24px rgba(201,169,110,0.35)}
.cart-badge{background:var(--accent);color:#fff;width:18px;height:18px;border-radius:50%;font-size:0.65rem;font-weight:700;display:flex;align-items:center;justify-content:center}
.user-menu{position:relative}
.user-btn{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--border);padding:6px 14px;border-radius:100px;color:var(--white);font-size:0.83rem;font-weight:500;transition:all 0.3s}
.user-btn:hover{border-color:var(--gold);color:var(--gold)}
.user-avatar{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-light));display:flex;align-items:center;justify-content:center;font-size:0.72rem;font-weight:700;color:#0a0a0f}
.dropdown{position:absolute;top:calc(100% + 10px);right:0;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:8px;min-width:190px;box-shadow:0 20px 60px rgba(0,0,0,0.5);opacity:0;pointer-events:none;transform:translateY(-8px);transition:all 0.3s;z-index:200}
.dropdown.open{opacity:1;pointer-events:all;transform:translateY(0)}
.dd-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;font-size:0.83rem;color:var(--muted);transition:all 0.2s;cursor:pointer}
.dd-item:hover{background:var(--card);color:var(--white)}
.dd-item.danger:hover{color:var(--accent)}
.dd-divider{height:1px;background:var(--border);margin:6px 0}

/* SUB PAGES */
.main{padding-top:68px;min-height:100vh}
.sub-page{display:none;padding:60px}
.sub-page.active{display:block;animation:fadeIn 0.3s ease}

/* HERO */
.hero{min-height:calc(100vh - 68px);display:grid;grid-template-columns:1fr 1fr;align-items:center;padding:60px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-200px;right:-200px;width:700px;height:700px;background:radial-gradient(circle,rgba(124,92,191,0.12) 0%,transparent 70%);animation:pulse 7s ease-in-out infinite}
.hero::after{content:'';position:absolute;bottom:-200px;left:0;width:500px;height:500px;background:radial-gradient(circle,rgba(201,169,110,0.07) 0%,transparent 70%);animation:pulse 9s ease-in-out infinite reverse}
.hero-content{position:relative;z-index:2}
.hero-tag{display:inline-flex;align-items:center;gap:8px;background:rgba(201,169,110,0.1);border:1px solid rgba(201,169,110,0.3);color:var(--gold);padding:6px 16px;border-radius:100px;font-size:0.7rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:28px;animation:fadeUp 0.7s 0.2s both}
.hero h1{font-family:var(--serif);font-size:clamp(2.5rem,5vw,4.5rem);font-weight:900;line-height:1.05;margin-bottom:24px;animation:fadeUp 0.7s 0.4s both}
.hero h1 em{font-style:italic;color:var(--gold);display:block}
.hero p{font-size:1rem;color:var(--muted);line-height:1.7;max-width:440px;margin-bottom:40px;animation:fadeUp 0.7s 0.6s both}
.hero-actions{display:flex;gap:14px;animation:fadeUp 0.7s 0.8s both}
.btn-primary{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:#0a0a0f;border:none;padding:14px 32px;border-radius:100px;font-size:0.9rem;font-weight:700;transition:all 0.3s}
.btn-primary:hover{transform:translateY(-3px);box-shadow:0 18px 45px rgba(201,169,110,0.4)}
.btn-ghost{background:transparent;color:var(--white);border:1px solid var(--border);padding:13px 26px;border-radius:100px;font-size:0.86rem;font-weight:500;transition:all 0.3s;display:flex;align-items:center;gap:8px}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
.hero-visual{display:flex;align-items:center;justify-content:center;animation:fadeIn 1s 0.3s both}
.hero-float{font-size:9rem;animation:float 5s ease-in-out infinite;text-align:center;position:relative}
.hero-float::after{content:'BEST SELLER';position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--gold),var(--gold-light));color:#0a0a0f;font-size:0.62rem;font-weight:800;letter-spacing:0.15em;padding:4px 14px;border-radius:100px;white-space:nowrap}

/* STATS */
.stats-bar{display:flex;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.stat{flex:1;padding:26px 40px;border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
.stat-num{font-family:var(--serif);font-size:2rem;font-weight:900;color:var(--gold)}
.stat-label{font-size:0.76rem;color:var(--muted);margin-top:2px;letter-spacing:0.05em}

/* FEATURED */
.featured-banner{background:var(--surface);border:1px solid var(--border);border-radius:24px;margin:0 60px;padding:60px;display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;position:relative;overflow:hidden}
.featured-banner::before{content:'';position:absolute;top:-80px;right:-80px;width:300px;height:300px;background:radial-gradient(circle,rgba(201,169,110,0.08),transparent 70%);animation:pulse 6s ease-in-out infinite}
.featured-emoji-big{font-size:10rem;text-align:center;animation:float 5s ease-in-out infinite}
.featured-tag{display:inline-flex;align-items:center;gap:8px;background:rgba(232,93,117,0.12);border:1px solid rgba(232,93,117,0.3);color:var(--accent);padding:5px 14px;border-radius:100px;font-size:0.68rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:18px}
.featured-banner h2{font-family:var(--serif);font-size:2.3rem;font-weight:900;line-height:1.15;margin-bottom:14px}
.featured-banner h2 em{font-style:italic;color:var(--gold)}
.featured-banner p{font-size:0.86rem;color:var(--muted);line-height:1.7;margin-bottom:24px}
.price-display{display:flex;align-items:baseline;gap:14px;margin-bottom:28px}
.price-display .main{font-family:var(--serif);font-size:2.2rem;font-weight:900;color:var(--gold)}
.price-display .old{font-size:1rem;color:var(--muted);text-decoration:line-through}
.price-display .disc{background:rgba(76,175,138,0.12);color:var(--green);border:1px solid rgba(76,175,138,0.25);padding:3px 10px;border-radius:100px;font-size:0.75rem;font-weight:700}

/* PRODUCTS */
.products-section{padding:80px 60px}
.section-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:36px}
.section-title{font-family:var(--serif);font-size:2.2rem;font-weight:900;line-height:1.1}
.section-title em{font-style:italic;color:var(--gold)}
.filters{display:flex;gap:10px;margin-bottom:32px;flex-wrap:wrap}
.filter-btn{padding:7px 16px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:0.78rem;font-weight:500;transition:all 0.3s}
.filter-btn.active{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:#0a0a0f;border-color:transparent;font-weight:700}
.filter-btn:hover:not(.active){border-color:var(--gold);color:var(--gold)}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px}
.product-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);animation:fadeUp 0.5s ease both;position:relative}
.product-card:hover{transform:translateY(-10px) scale(1.01);box-shadow:0 25px 70px rgba(0,0,0,0.45),0 0 0 1px rgba(201,169,110,0.2)}
.product-badge{position:absolute;top:12px;left:12px;font-size:0.65rem;font-weight:800;letter-spacing:0.08em;padding:3px 10px;border-radius:100px;z-index:2;text-transform:uppercase}
.badge-new{background:var(--green);color:#fff}
.badge-hot{background:var(--accent);color:#fff}
.badge-sale{background:#7c5cbf;color:#fff}
.product-wish{position:absolute;top:12px;right:12px;background:rgba(10,10,15,0.7);border:1px solid var(--border);color:var(--muted);width:34px;height:34px;border-radius:50%;font-size:0.9rem;display:flex;align-items:center;justify-content:center;transition:all 0.3s;z-index:2;backdrop-filter:blur(8px)}
.product-wish:hover,.product-wish.liked{color:var(--accent);border-color:var(--accent)}
.product-img{height:190px;display:flex;align-items:center;justify-content:center;font-size:5rem;background:linear-gradient(135deg,var(--surface),var(--card));position:relative;overflow:hidden;transition:transform 0.5s}
.product-card:hover .product-img{transform:scale(1.06)}
.product-img::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,var(--card) 0%,transparent 55%)}
.product-info{padding:16px}
.product-cat{font-size:0.66rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.product-name{font-family:var(--serif);font-size:1.05rem;font-weight:700;margin-bottom:6px;line-height:1.3}
.product-desc{font-size:0.76rem;color:var(--muted);line-height:1.5;margin-bottom:10px}
.product-rating{display:flex;align-items:center;gap:6px;margin-bottom:12px;font-size:0.76rem}
.stars{color:var(--gold)}
.product-footer{display:flex;align-items:center;justify-content:space-between}
.price-wrap{display:flex;flex-direction:column}
.price-old{font-size:0.7rem;color:var(--muted);text-decoration:line-through}
.price-now{font-family:var(--serif);font-size:1.1rem;font-weight:700;color:var(--gold)}
.add-btn{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:#0a0a0f;border:none;width:40px;height:40px;border-radius:10px;font-size:1.2rem;display:flex;align-items:center;justify-content:center;transitio
